<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easter Bunny Crawler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Spring Pastel Palette */
            --bg-color: #f0fdf4;     /* Green 50 */
            --fog-color: #dcfce7;    /* Green 100 */
            --fog-dim: #bbf7d0;      /* Green 200 */
            --wall-front: #4ade80;   /* Green 400 (Hedge) */
            --wall-top: #22c55e;     /* Green 500 */
            --floor: #fffbeb;        /* Amber 50 (Dirt/Sand path) */
        }

        body {
            font-family: 'Varela Round', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#86efac 1px, transparent 1px);
            background-size: 20px 20px;
            color: #14532d;
            overflow: hidden;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Game Container */
        .game-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border: 4px solid #86efac; /* Green 300 */
            overflow: hidden;
            position: relative;
        }

        /* The Grid */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(var(--cols), 1fr);
            background-color: var(--floor); 
        }
        
        .cell {
            width: 100%;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 3vw, 28px);
            position: relative;
            transition: background-color 0.2s;
        }

        /* Visual Styles for Tiles */
        .tile-wall {
            background-color: var(--wall-front);
            border-bottom: 4px solid var(--wall-top);
            border-radius: 4px;
            box-sizing: border-box;
            background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 2h2v2H2V2zm4 4h2v2H6V6zm4-4h2v2h-2V2zm4 4h2v2h-2V6z' fill='%23166534' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        
        .tile-floor {
            background-color: var(--floor);
            border: 1px solid #fef3c7; /* subtle grid */
        }

        .tile-fog {
            background-color: var(--bg-color);
            opacity: 0.1; /* Almost invisible */
        }
        
        .tile-dim {
            background-color: var(--fog-dim); 
            filter: grayscale(40%) opacity(0.6);
        }

        /* Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20%); }
        }
        .player-anim { animation: bounce 0.4s infinite ease-in-out; z-index: 20; filter: drop-shadow(0 4px 2px rgba(0,0,0,0.15)); }

        @keyframes pulse-heart {
            0% { transform: scale(1) rotate(0deg); }
            25% { transform: scale(1.1) rotate(-5deg); }
            50% { transform: scale(1.15) rotate(0deg); }
            75% { transform: scale(1.1) rotate(5deg); }
            100% { transform: scale(1) rotate(0deg); }
        }
        .goal-anim { animation: pulse-heart 1.5s infinite ease-in-out; z-index: 10; filter: drop-shadow(0 4px 4px rgba(0,0,0,0.2)); }

        @keyframes float-up {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-40px) scale(1.2); opacity: 0; }
        }
        .float-text { animation: float-up 1s forwards; position: absolute; font-weight: bold; pointer-events: none; z-index: 30; text-shadow: 2px 2px 0px #fff; }

        @keyframes monster-hop {
            0%, 100% { transform: translateY(0) scaleY(1); }
            30% { transform: translateY(-8px) scaleY(1.1); }
            70% { transform: translateY(0) scaleY(0.9); }
        }
        .monster-anim { animation: monster-hop 0.8s infinite; }

        /* Controls */
        .control-btn {
            background: white;
            border: 2px solid #34d399; /* Emerald 400 */
            color: #059669; /* Emerald 600 */
            border-radius: 12px;
            font-size: 1.5rem;
            box-shadow: 0 4px 0 #10b981; /* Emerald 500 */
            transition: all 0.1s;
        }
        .control-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #10b981;
        }
        
        /* Shake effect for taking damage */
        .shake {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-2px, 0, 0); }
            20%, 80% { transform: translate3d(4px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-6px, 0, 0); }
            40%, 60% { transform: translate3d(6px, 0, 0); }
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center">

    <!-- Header -->
    <div class="w-full max-w-2xl flex justify-between items-end mb-2 px-4 z-10">
        <div class="bg-white px-4 py-2 rounded-xl border-2 border-emerald-200 shadow-sm">
            <div class="text-xs text-emerald-500 font-bold uppercase tracking-wider">Depth</div>
            <div id="level-display" class="font-['Fredoka_One'] text-2xl text-emerald-600 leading-none">1</div>
        </div>
        
        <h1 class="font-['Fredoka_One'] text-2xl md:text-4xl text-emerald-600 drop-shadow-sm pb-1">Easter Maze</h1>

        <div class="bg-white px-4 py-2 rounded-xl border-2 border-emerald-200 shadow-sm text-right">
            <div class="text-xs text-emerald-500 font-bold uppercase tracking-wider">Score</div>
            <div id="score-display" class="font-['Fredoka_One'] text-2xl text-emerald-600 leading-none">0</div>
        </div>
    </div>

    <!-- Game View -->
    <div id="game-container" class="game-card w-full max-w-2xl aspect-square md:aspect-[4/3] max-h-[70vh]">
        <!-- Grid -->
        <div id="grid-container" class="w-full h-full relative bg-green-50">
            <div id="game-grid" class="game-grid w-full h-full"></div>
            <div id="floating-text-container" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            
            <!-- Transition Overlay -->
            <div id="level-overlay" class="hidden absolute inset-0 bg-white/90 z-50 flex flex-col items-center justify-center transition-opacity duration-500">
                <div class="text-7xl mb-4 animate-bounce">🧺</div>
                <h2 class="font-['Fredoka_One'] text-4xl text-emerald-500 mb-2">Basket Found!</h2>
                <p class="text-emerald-600 font-bold text-xl">The maze shifts...</p>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="mt-4 w-full max-w-md flex flex-col items-center gap-2">
        <p class="text-emerald-600 text-sm font-bold md:block hidden">
            Explore the hedge maze • Beware of predators!
        </p>

        <!-- D-Pad for Touch -->
        <div class="grid grid-cols-3 gap-2 w-48 md:hidden">
            <div></div>
            <button class="control-btn h-14 flex items-center justify-center" onclick="handleInput(0, -1)">⬆️</button>
            <div></div>
            <button class="control-btn h-14 flex items-center justify-center" onclick="handleInput(-1, 0)">⬅️</button>
            <div class="flex items-center justify-center text-3xl">🐰</div>
            <button class="control-btn h-14 flex items-center justify-center" onclick="handleInput(1, 0)">➡️</button>
            <div></div>
            <button class="control-btn h-14 flex items-center justify-center" onclick="handleInput(0, 1)">⬇️</button>
            <div></div>
        </div>
    </div>

<script>
    /* --- CONFIG --- */
    const VIEW_WIDTH = 13;  
    const VIEW_HEIGHT = 11;
    const MAP_SIZE = 40;    
    
    // Easter Assets
    const EMOJIS = {
        PLAYER: '🐰',
        GOAL: '🧺',
        WALL: '',
        FLOOR: '',
        FOG: '🌿'
    };
    
    const TREATS = [
        { icon: '🥕', val: 10 }, { icon: '🌷', val: 15 }, 
        { icon: '🍬', val: 20 }, { icon: '🥚', val: 25 }, 
        { icon: '🍫', val: 30 }, { icon: '🪺', val: 50 },
        { icon: '✨', val: 100 }
    ];

    const MONSTERS = [
        { icon: '🦊', val: -40, name: 'Fox' },
        { icon: '🐺', val: -60, name: 'Wolf' },
        { icon: '🦅', val: -30, name: 'Eagle' }
    ];

    /* --- STATE --- */
    let gameState = {
        map: [],      // 1=Wall, 0=Floor
        seen: [],     
        visible: [],  
        entities: [], 
        player: { x: 1, y: 1 },
        level: 1,
        score: 0,
        camera: { x: 0, y: 0 },
        inputLocked: false
    };

    /* --- INIT --- */
    window.onload = () => {
        startLevel();
    };

    function startLevel() {
        gameState.inputLocked = false;
        document.getElementById('level-overlay').classList.add('hidden');
        
        generateDungeon();
        updateFOV();
        centerCamera();
        render();
        updateUI();
    }

    /* --- GENERATION: ROOMS & CORRIDORS --- */
    function generateDungeon() {
        gameState.map = [];
        gameState.seen = [];
        gameState.visible = [];
        gameState.entities = [];

        for(let y=0; y<MAP_SIZE; y++) {
            let rowMap = [], rowSeen = [], rowVis = [];
            for(let x=0; x<MAP_SIZE; x++) {
                rowMap.push(1); 
                rowSeen.push(false);
                rowVis.push(false);
            }
            gameState.map.push(rowMap);
            gameState.seen.push(rowSeen);
            gameState.visible.push(rowVis);
        }

        const rooms = [];
        const MAX_ROOMS = 16;
        const MIN_SIZE = 4;
        const MAX_SIZE = 9;

        for(let i=0; i<MAX_ROOMS; i++) {
            let w = Math.floor(Math.random() * (MAX_SIZE - MIN_SIZE + 1)) + MIN_SIZE;
            let h = Math.floor(Math.random() * (MAX_SIZE - MIN_SIZE + 1)) + MIN_SIZE;
            let x = Math.floor(Math.random() * (MAP_SIZE - w - 2)) + 1;
            let y = Math.floor(Math.random() * (MAP_SIZE - h - 2)) + 1;

            const newRoom = { x, y, w, h };

            let failed = false;
            for(let other of rooms) {
                if(newRoom.x <= other.x + other.w && newRoom.x + newRoom.w >= other.x &&
                   newRoom.y <= other.y + other.h && newRoom.y + newRoom.h >= other.y) {
                    failed = true;
                    break;
                }
            }

            if(!failed) {
                createRoom(newRoom);
                
                if(rooms.length > 0) {
                    const prev = rooms[rooms.length-1];
                    const prevCenter = { x: Math.floor(prev.x + prev.w/2), y: Math.floor(prev.y + prev.h/2) };
                    const newCenter = { x: Math.floor(newRoom.x + newRoom.w/2), y: Math.floor(newRoom.y + newRoom.h/2) };
                    
                    if(Math.random() < 0.5) {
                        createHStrip(prevCenter.x, newCenter.x, prevCenter.y);
                        createVStrip(prevCenter.y, newCenter.y, newCenter.x);
                    } else {
                        createVStrip(prevCenter.y, newCenter.y, prevCenter.x);
                        createHStrip(prevCenter.x, newCenter.x, newCenter.y);
                    }
                }
                rooms.push(newRoom);
            }
        }

        // Place Player
        const startRoom = rooms[0];
        gameState.player.x = Math.floor(startRoom.x + startRoom.w/2);
        gameState.player.y = Math.floor(startRoom.y + startRoom.h/2);

        // Place Goal 
        const endRoom = rooms[rooms.length-1];
        let goalX = Math.floor(endRoom.x + endRoom.w/2);
        let goalY = Math.floor(endRoom.y + endRoom.h/2);
        
        gameState.entities.push({ type: 'goal', x: goalX, y: goalY, icon: EMOJIS.GOAL });

        // Place Treats
        let treatCount = 12 + (gameState.level * 2);
        placeEntities('treat', treatCount, TREATS);

        // Place Monsters (More of them now!)
        let monsterCount = 5 + gameState.level; 
        placeEntities('monster', monsterCount, MONSTERS);
    }

    function placeEntities(type, count, sourceArray) {
        let safety = 0;
        while(count > 0 && safety < 1000) {
            safety++;
            let rx = Math.floor(Math.random() * MAP_SIZE);
            let ry = Math.floor(Math.random() * MAP_SIZE);
            
            if(gameState.map[ry][rx] === 0 && !getEntityAt(rx, ry) && !(rx === gameState.player.x && ry === gameState.player.y)) {
                let t = sourceArray[Math.floor(Math.random() * sourceArray.length)];
                gameState.entities.push({ type: type, x: rx, y: ry, icon: t.icon, val: t.val });
                count--;
            }
        }
    }

    function createRoom(room) {
        for(let y = room.y; y < room.y + room.h; y++) {
            for(let x = room.x; x < room.x + room.w; x++) {
                gameState.map[y][x] = 0; 
            }
        }
    }

    function createHStrip(x1, x2, y) {
        for(let x = Math.min(x1, x2); x <= Math.max(x1, x2); x++) {
            gameState.map[y][x] = 0;
        }
    }

    function createVStrip(y1, y2, x) {
        for(let y = Math.min(y1, y2); y <= Math.max(y1, y2); y++) {
            gameState.map[y][x] = 0;
        }
    }

    /* --- GAME LOGIC --- */
    function handleInput(dx, dy) {
        if(gameState.inputLocked) return;

        const newX = gameState.player.x + dx;
        const newY = gameState.player.y + dy;

        // Wall Check
        if(gameState.map[newY][newX] === 1) return;

        // Check Interactions BEFORE moving
        const entIndex = gameState.entities.findIndex(e => e.x === newX && e.y === newY);
        if(entIndex !== -1) {
            let ent = gameState.entities[entIndex];
            
            if(ent.type === 'monster') {
                hitMonster(ent, entIndex);
                return; // Bounce back
            } else if(ent.type === 'treat') {
                gameState.score += ent.val;
                showFloatText(`+${ent.val}`, '#10b981'); // Emerald 500
                gameState.entities.splice(entIndex, 1);
            } else if (ent.type === 'goal') {
                gameState.player.x = newX;
                gameState.player.y = newY;
                levelComplete();
                return; 
            }
        }

        gameState.player.x = newX;
        gameState.player.y = newY;

        updateMonsters();

        updateUI();
        updateFOV();
        centerCamera();
        render();
    }

    function updateMonsters() {
        // Chasing Logic
        gameState.entities.forEach((ent, index) => {
            if(ent.type !== 'monster') return;

            // 25% chance to pause (gives player a slight speed advantage to escape)
            if(Math.random() < 0.25) return;

            let mx = ent.x;
            let my = ent.y;
            let moveMade = false;

            // Distance to bunny
            let dist = Math.abs(gameState.player.x - ent.x) + Math.abs(gameState.player.y - ent.y);

            // If player is close enough to smell/see (Radius 8)
            if (dist < 8) {
                let possibleMoves = [];
                
                // Bias moves toward player coordinates
                if (gameState.player.x < ent.x) possibleMoves.push({x:-1, y:0});
                else if (gameState.player.x > ent.x) possibleMoves.push({x:1, y:0});

                if (gameState.player.y < ent.y) possibleMoves.push({x:0, y:-1});
                else if (gameState.player.y > ent.y) possibleMoves.push({x:0, y:1});

                // Shuffle so they don't always get stuck on walls diagonally
                possibleMoves.sort(() => Math.random() - 0.5);

                for (let move of possibleMoves) {
                    let tx = ent.x + move.x;
                    let ty = ent.y + move.y;
                    
                    // Allow moving onto player, but NOT into walls or other entities
                    if (gameState.map[ty][tx] === 0 && !getEntityAtExcluding(tx, ty, ent)) {
                        mx = tx;
                        my = ty;
                        moveMade = true;
                        break;
                    }
                }
            }

            // If far away, or chase was blocked by a wall, wander randomly
            if (!moveMade) {
                const moves = [{x:0, y:-1}, {x:0, y:1}, {x:-1, y:0}, {x:1, y:0}];
                const move = moves[Math.floor(Math.random() * moves.length)];
                let tx = ent.x + move.x;
                let ty = ent.y + move.y;
                
                if(tx > 0 && tx < MAP_SIZE && ty > 0 && ty < MAP_SIZE && gameState.map[ty][tx] === 0 && !getEntityAtExcluding(tx, ty, ent)) {
                    mx = tx;
                    my = ty;
                }
            }

            // Check if they stepped onto the player
            if (mx === gameState.player.x && my === gameState.player.y) {
                hitMonster(ent, index);
            } else {
                ent.x = mx;
                ent.y = my;
            }
        });
    }

    function getEntityAtExcluding(x, y, excludeEnt) {
        return gameState.entities.find(e => e.x === x && e.y === y && e !== excludeEnt && e.type !== 'goal');
    }

    function getEntityAt(x, y) {
        return gameState.entities.find(e => e.x === x && e.y === y);
    }

    function hitMonster(ent, index) {
        gameState.score += ent.val; 
        
        // Prevent score from going below zero
        if(gameState.score < 0) gameState.score = 0;

        showFloatText(`${ent.val} Eggs!`, '#ef4444'); // Red text
        
        const container = document.getElementById('game-container');
        container.classList.remove('shake');
        void container.offsetWidth; 
        container.classList.add('shake');

        // Monster vanishes after stealing eggs
        gameState.entities.splice(index, 1);
        updateUI();
    }

    function levelComplete() {
        gameState.inputLocked = true;
        gameState.score += 250;
        gameState.level++;
        updateUI();
        
        document.getElementById('level-overlay').classList.remove('hidden');
        
        setTimeout(() => {
            startLevel();
        }, 2000);
    }

    /* --- FOV & RENDERING --- */
    function updateFOV() {
        for(let y=0; y<MAP_SIZE; y++) {
            for(let x=0; x<MAP_SIZE; x++) {
                gameState.visible[y][x] = false;
            }
        }

        const R = 6; 
        for(let y = -R; y <= R; y++) {
            for(let x = -R; x <= R; x++) {
                if(x*x + y*y <= R*R) {
                    const tx = gameState.player.x + x;
                    const ty = gameState.player.y + y;
                    if(tx >= 0 && tx < MAP_SIZE && ty >= 0 && ty < MAP_SIZE) {
                        gameState.visible[ty][tx] = true;
                        gameState.seen[ty][tx] = true;
                    }
                }
            }
        }
    }

    function centerCamera() {
        gameState.camera.x = gameState.player.x - Math.floor(VIEW_WIDTH/2);
        gameState.camera.y = gameState.player.y - Math.floor(VIEW_HEIGHT/2);
    }

    function render() {
        const grid = document.getElementById('game-grid');
        grid.innerHTML = '';
        document.documentElement.style.setProperty('--cols', VIEW_WIDTH);

        for(let y=0; y<VIEW_HEIGHT; y++) {
            for(let x=0; x<VIEW_WIDTH; x++) {
                const mx = gameState.camera.x + x;
                const my = gameState.camera.y + y;
                
                const cell = document.createElement('div');
                cell.className = 'cell';

                if(mx >= 0 && mx < MAP_SIZE && my >= 0 && my < MAP_SIZE) {
                    const isWall = gameState.map[my][mx] === 1;
                    const isVisible = gameState.visible[my][mx];
                    const hasSeen = gameState.seen[my][mx];

                    if(isVisible) {
                        if(isWall) {
                            cell.classList.add('tile-wall');
                        } else {
                            cell.classList.add('tile-floor');
                            const ent = getEntityAt(mx, my);
                            if(ent) {
                                const div = document.createElement('div');
                                div.innerText = ent.icon;
                                if(ent.type === 'goal') div.className = 'goal-anim text-3xl md:text-4xl';
                                else if (ent.type === 'monster') div.className = 'monster-anim text-2xl md:text-3xl filter drop-shadow-md';
                                else div.className = 'text-2xl hover:scale-110 transition-transform';
                                cell.appendChild(div);
                            }
                            if(mx === gameState.player.x && my === gameState.player.y) {
                                const p = document.createElement('div');
                                p.innerText = EMOJIS.PLAYER;
                                p.className = 'player-anim text-3xl md:text-4xl absolute';
                                cell.appendChild(p);
                            }
                        }
                    } else if (hasSeen) {
                        cell.classList.add('tile-dim');
                        if(isWall) {
                             cell.style.backgroundColor = 'var(--wall-top)';
                             cell.style.backgroundImage = 'none';
                             cell.style.border = 'none';
                        }
                    } else {
                        cell.classList.add('tile-fog');
                    }
                } else {
                    cell.classList.add('tile-fog');
                }
                grid.appendChild(cell);
            }
        }
    }

    function updateUI() {
        document.getElementById('score-display').innerText = gameState.score;
        document.getElementById('level-display').innerText = gameState.level;
    }

    function showFloatText(text, color) {
        const container = document.getElementById('floating-text-container');
        const el = document.createElement('div');
        el.innerText = text;
        el.style.color = color;
        el.className = 'float-text text-xl md:text-2xl';
        el.style.left = '50%';
        el.style.top = '50%';
        el.style.transform = 'translate(-50%, -50%)';
        container.appendChild(el);
        setTimeout(() => el.remove(), 1000);
    }

    /* --- INPUT --- */
    window.addEventListener('keydown', (e) => {
        if(['ArrowUp','w'].includes(e.key)) { e.preventDefault(); handleInput(0, -1); }
        if(['ArrowDown','s'].includes(e.key)) { e.preventDefault(); handleInput(0, 1); }
        if(['ArrowLeft','a'].includes(e.key)) { e.preventDefault(); handleInput(-1, 0); }
        if(['ArrowRight','d'].includes(e.key)) { e.preventDefault(); handleInput(1, 0); }
    });

</script>
</body>
</html>
